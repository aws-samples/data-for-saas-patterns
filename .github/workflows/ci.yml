name: CI

on:
  push:
    paths:
      - "samples/multi-tenant-strands-s3-vectors-memory/**"
  pull_request:
    paths:
      - "samples/multi-tenant-strands-s3-vectors-memory/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: samples/multi-tenant-strands-s3-vectors-memory

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — no AWS credentials required, fast
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

  # ---------------------------------------------------------------------------
  # Integration tests — require live AWS credentials, skipped in CI.
  # Run locally: S3_VECTOR_BUCKET_NAME=... S3_VECTOR_TVM_ROLE_ARN=... python -m pytest tests/integration/ -v
  # ---------------------------------------------------------------------------
  # integration-tests: disabled — requires AWS credentials not available in CI
