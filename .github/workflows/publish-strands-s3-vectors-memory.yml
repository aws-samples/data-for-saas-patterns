name: Publish strands-s3-vectors-memory to PyPI

# Triggers:
#   - Manual dispatch (for testing / hotfixes)
#   - Push of a version tag scoped to this package: s3vm/v*
#     e.g.  git tag s3vm/v0.2.0 && git push origin s3vm/v0.2.0
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target registry (testpypi | pypi)"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]
  push:
    tags:
      - "s3vm/v*"          # scoped tag keeps this workflow isolated from other samples

defaults:
  run:
    working-directory: samples/multi-tenant-strands-s3-vectors-memory

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — build the wheel + sdist
  # ---------------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: samples/multi-tenant-strands-s3-vectors-memory/dist/
          if-no-files-found: error

  # -----------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Job 2 — publish to TestPyPI
  #   Runs on: manual dispatch with environment=testpypi
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'testpypi'

    environment:
      name: testpypi
      url: https://test.pypi.org/p/strands-s3-vectors-memory

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Job 3 — publish to PyPI
  #   Runs on: version tag push (s3vm/v*) OR manual dispatch with environment=pypi
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')

    environment:
      name: pypi
      url: https://pypi.org/p/strands-s3-vectors-memory

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
